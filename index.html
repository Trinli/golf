<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flightlotten" />
  <title>Flightlotten</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">
      <img src="icon-source.svg" alt="" class="app-icon" width="28" height="28" />
      <h1>Flightlotten</h1>
    </div>
    <button id="add-player-btn" class="btn btn-primary">+ Lägg till</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="players">Spelare</button>
    <button class="tab-btn" data-tab="lottery">Lottning</button>
  </nav>

  <main>
    <section id="tab-players" class="tab-panel">
      <p id="empty-state" class="empty-state" hidden>Inga spelare tillagda ännu. Tryck på "+ Lägg till" för att komma igång.</p>
      <ul id="player-list" class="player-list"></ul>
    </section>

    <section id="tab-lottery" class="tab-panel" hidden>
      <div class="lottery-controls">
        <div class="field-row">
          <label class="field">
            <span>Datum</span>
            <input id="lottery-date" type="date" />
          </label>
          <label class="field">
            <span>Första flightens starttid</span>
            <input id="lottery-start-time" type="time" value="09:00" />
          </label>
        </div>

        <div class="attendance-header">
          <span>Deltagare denna vecka</span>
          <div class="attendance-actions">
            <button id="select-all-btn" class="btn-link" type="button">Markera alla</button>
            <button id="select-none-btn" class="btn-link" type="button">Avmarkera alla</button>
          </div>
        </div>
        <ul id="attendance-list" class="attendance-list"></ul>

        <button id="generate-btn" class="btn btn-primary btn-block" type="button">Lotta grupper</button>
      </div>

      <div id="lottery-result" class="lottery-result" hidden>
        <div id="lottery-banner" class="lottery-banner" hidden></div>
        <div id="flight-container" class="flight-container"></div>
        <p class="hint">Tryck på två spelare i olika flighter för att byta plats på dem.</p>
        <div class="result-actions">
          <button id="reroll-btn" class="btn btn-secondary" type="button">Slumpa om</button>
          <button id="mail-btn" class="btn btn-secondary" type="button">Skicka via mail</button>
          <button id="save-week-btn" class="btn btn-primary" type="button">Spara vecka</button>
        </div>
      </div>

      <div class="history-section">
        <h2>Tidigare veckor</h2>
        <p id="history-empty" class="empty-state" hidden>Inga sparade veckor ännu.</p>
        <ul id="history-list" class="history-list"></ul>
      </div>
    </section>
  </main>

  <footer id="players-footer" class="footer-actions">
    <span id="player-count" class="player-count"></span>
    <div class="footer-buttons">
      <button id="export-btn" class="btn btn-secondary">Exportera</button>
      <button id="import-btn" class="btn btn-secondary">Importera</button>
      <input id="import-file" type="file" accept="application/json" hidden />
    </div>
  </footer>

  <div id="sheet-backdrop" class="sheet-backdrop" hidden>
    <div id="sheet" class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <h2 id="sheet-title">Ny spelare</h2>

      <form id="player-form">
        <label class="field">
          <span>Namn</span>
          <input id="field-name" type="text" autocomplete="off" required />
        </label>

        <label class="field">
          <span>Handicap</span>
          <input id="field-handicap" type="number" step="0.1" inputmode="decimal" required />
        </label>

        <label class="field">
          <span>Gift med</span>
          <select id="field-spouse">
            <option value="">Ingen</option>
          </select>
        </label>

        <label class="field" id="spouse-preference-field" hidden>
          <span>Preferens med respektive</span>
          <select id="field-spouse-preference">
            <option value="apart">Hålls isär (standard)</option>
            <option value="together">Spelar alltid tillsammans</option>
            <option value="teeBefore">Startar före respektive</option>
            <option value="teeAfter">Startar efter respektive</option>
          </select>
        </label>

        <label class="field field-toggle">
          <span>Långsam spelare</span>
          <input id="field-slow" type="checkbox" />
        </label>

        <label class="field field-toggle">
          <span>Behöver golfbil</span>
          <input id="field-cart" type="checkbox" />
        </label>

        <label class="field">
          <span>Starttidspreferens</span>
          <select id="field-time-preference">
            <option value="none">Ingen preferens</option>
            <option value="early">Vill starta tidigt</option>
            <option value="late">Vill starta sent</option>
          </select>
        </label>

        <div class="sheet-actions">
          <button type="button" id="delete-btn" class="btn btn-danger" hidden>Ta bort</button>
          <div class="sheet-actions-right">
            <button type="button" id="cancel-btn" class="btn btn-secondary">Avbryt</button>
            <button type="submit" class="btn btn-primary">Spara</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="lottery.js"></script>
</body>
</html>
